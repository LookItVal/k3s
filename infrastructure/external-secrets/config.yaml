apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: infisical
  namespace: flux-system
spec:
  provider:
    infisical:
      hostAPI: https://app.infisical.com
      auth:
        universalAuthCredentials:
          clientId:
            name: universal-auth-credentials
            namespace: flux-system
            key: client-id
          clientSecret:
            name: universal-auth-credentials
            namespace: flux-system
            key: client-secret
      secretsScope:
        projectSlug: k3-s-secrets-mz-kq
        environmentSlug: prod