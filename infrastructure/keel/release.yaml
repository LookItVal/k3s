apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keel
  namespace: kube-system
spec:
  releaseName: keel
  interval: 1h
  chart:
    spec:
      chart: keel
      version: "v1.0.4"
      sourceRef:
        kind: HelmRepository
        name: keel-repo
        namespace: flux-system
  values:
    service:
      enabled: true
      type: ClusterIP
    helmProvider:
      enabled: true