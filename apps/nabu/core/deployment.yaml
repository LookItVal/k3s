apiVersion: apps/v1
kind: Deployment
metadata:
  name: nabu-core
  namespace: nabu
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 10m"
    keel.sh/match-tag: "true"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: nabu-core
  template:
    metadata:
      labels:
        app: nabu-core
    spec:
      containers:
        - name: nabu-core
          image: ghcr.io/lookitval/nabu-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PG_HOST
              value: "nabu-postgres-service.nabu.svc.cluster.local"
            - name: PG_PORT
              value: "5432"
            - name: PG_DB
              value: "nabu_db"
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: password
            - name: REDIS_ADDR
              value: "nabu-redis-service.nabu.svc.cluster.local:6379"
            - name: REDIS_PASSWORD
              value: ""
            - name: REDIS_DB
              value: "0"