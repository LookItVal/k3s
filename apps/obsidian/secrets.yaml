apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: couchdb-creds-sync
  namespace: obsidian
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: couchdb-creds
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: COUCHDB_USER
  - secretKey: password
    remoteRef:
      key: COUCHDB_PASSWORD