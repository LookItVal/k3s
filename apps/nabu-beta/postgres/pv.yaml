apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-nabu-beta-postgres-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.86.170
    path: /shared/nabu-beta/postgres
  mountOptions:
    - nfsvers=4.1
    - hard